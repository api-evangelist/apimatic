aid: apimatic
name: APIMatic
description: >-
  APIMatic is a developer experience platform for APIs that specializes in
  automated SDK generation, API documentation portal creation, specification
  validation and linting, and API format transformation. It supports 15+
  API specification formats and generates idiomatic SDKs in 7+ programming
  languages with CI/CD integration for automating the developer experience suite.
type: Index
