apis:
  - aid: apimatic:apimatic-platform-api
    name: APIMatic Platform API
    description: >-
      The APIMatic Platform API provides programmatic access to APIMatic's
      capabilities including SDK generation, API documentation portal
      generation, API specification validation and linting, and API
      specification transformation. Integrate APIMatic into your CI/CD
      workflows to automate your developer experience suite.
    humanURL: https://docs.apimatic.io/platform-api/
    baseURL: https://api.apimatic.io
    tags:
      - Code Generation
      - Documentation
      - SDK Generation
      - Transformation
      - Validation
    properties:
      - type: Documentation
        url: https://docs.apimatic.io/platform-api/
      - type: GettingStarted
        url: https://docs.apimatic.io/platform-api/#/http/getting-started
      - type: OpenAPI
        url: openapi/apimatic-platform-api.yaml
      - type: JSONSchema
        url: json-schema/apimatic-api-entity-schema.json
      - type: JSONSchema
        url: json-schema/apimatic-sdk-generation-schema.json
      - type: JSON-LD
        url: json-ld/apimatic-context.jsonld
  - aid: apimatic:apimatic-api-transformer-api
    name: APIMatic API Transformer API
    description: >-
      APIMatic API Transformer converts API definition files between more
      than 15 supported API specification formats including OpenAPI, RAML,
      API Blueprint, WSDL, WADL, and Postman Collections.
    humanURL: https://www.apimatic.io/solution/transformer
    baseURL: https://api.apimatic.io
    tags:
