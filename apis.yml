aid: apimatic
url: >-
  https://raw.githubusercontent.com/api-evangelist/apimatic/refs/heads/main/apis.yml
apis:
  - aid: apimatic:apimatic-platform-api
    name: APIMatic Platform API
    tags:
      - SDK
      - Code Generation
      - Documentation
      - Transformation
      - Validation
    humanURL: https://docs.apimatic.io/platform-api/
    properties:
      - url: https://docs.apimatic.io/platform-api/
        type: Documentation
      - url: https://docs.apimatic.io/platform-api/#/http/getting-started
        type: GettingStarted
    description: >-
      The APIMatic Platform API provides programmatic access to APIMatic's
      capabilities including SDK generation, API documentation portal
      generation, API specification validation and linting, and API
      specification transformation. Integrate APIMatic into your CI/CD
      workflows to automate your developer experience suite.
  - aid: apimatic:apimatic-api-transformer-api
    name: APIMatic API Transformer API
    tags:
      - Transformation
      - Conversion
      - OpenAPI
      - Swagger
      - RAML
      - Postman
    humanURL: https://www.apimatic.io/solution/transformer
    properties:
      - url: https://docs.apimatic.io/api-transformer/overview-transformer/
        type: Documentation
      - url: https://www.apimatic.io/solution/transformer
        type: Product
      - url: https://github.com/apimatic/apimatic-transformer-action
        type: GitHub Action
    description: >-
      APIMatic API Transformer converts API definition files between more
      than 15 supported API specification formats including OpenAPI, RAML,
      API Blueprint, WSDL, WADL, and Postman Collections. Multi-file API
      descriptions and ZIP files are supported with an average
      transformation taking less than half a minute.
  - aid: apimatic:apimatic
    name: APIMatic
    tags:
      - SDK
      - Platform
      - Portals
      - SDKs
      - Developer Experience
      - Code Generation
    humanURL: https://www.apimatic.io/
    properties:
      - url: https://www.apimatic.io/
        type: Documentation
      - url: https://www.apimatic.io/product/define
        type: Product
      - url: https://www.apimatic.io/product/generate
        type: Product
      - url: https://www.apimatic.io/product/publish
        type: Product
    description: >-
      The Trusted Developer Experience platform for APIs. Achieve faster API
      onboarding via automatic SDKs, docs, code samples, and guided
      walkthroughs.
