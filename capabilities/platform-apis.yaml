naftiko: 1.0.0-alpha2
info:
  label: APIMatic Platform API — APIs
  description: 'APIMatic Platform API — APIs. 2 operations. Lead operation: List API Entities. Self-contained Naftiko capability
    covering one Apimatic business surface.'
  tags:
  - Apimatic
  - APIs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIMATIC_API_KEY: APIMATIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-apis
    baseUri: https://api.apimatic.io
    description: APIMatic Platform API — APIs business capability. Self-contained, no shared references.
    resources:
    - name: api-entities
      path: /api-entities
      operations:
      - name: listapientities
        method: GET
        description: List API Entities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: importapidefinition
        method: POST
        description: Import API Definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.APIMATIC_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: platform-apis-rest
    port: 8080
    description: REST adapter for APIMatic Platform API — APIs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api-entities
      name: api-entities
      description: REST surface for api-entities.
      operations:
      - method: GET
        name: listapientities
        description: List API Entities
        call: platform-apis.listapientities
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: importapidefinition
        description: Import API Definition
        call: platform-apis.importapidefinition
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-apis-mcp
    port: 9090
    transport: http
    description: MCP adapter for APIMatic Platform API — APIs. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-api-entities
      description: List API Entities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-apis.listapientities
      outputParameters:
      - type: object
        mapping: $.
    - name: import-api-definition
      description: Import API Definition
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-apis.importapidefinition
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
