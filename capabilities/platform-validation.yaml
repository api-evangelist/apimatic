naftiko: 1.0.0-alpha2
info:
  label: APIMatic Platform API — Validation
  description: 'APIMatic Platform API — Validation. 1 operations. Lead operation: Validate API Definition. Self-contained
    Naftiko capability covering one Apimatic business surface.'
  tags:
  - Apimatic
  - Validation
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APIMATIC_API_KEY: APIMATIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-validation
    baseUri: https://api.apimatic.io
    description: APIMatic Platform API — Validation business capability. Self-contained, no shared references.
    resources:
    - name: api-entities-apiEntityId-validate
      path: /api-entities/{apiEntityId}/validate
      operations:
      - name: validateapidefinition
        method: POST
        description: Validate API Definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiEntityId
          in: path
          type: string
          description: Unique identifier of the API entity
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.APIMATIC_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: platform-validation-rest
    port: 8080
    description: REST adapter for APIMatic Platform API — Validation. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api-entities/{apientityid}/validate
      name: api-entities-apientityid-validate
      description: REST surface for api-entities-apiEntityId-validate.
      operations:
      - method: POST
        name: validateapidefinition
        description: Validate API Definition
        call: platform-validation.validateapidefinition
        with:
          apiEntityId: rest.apiEntityId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-validation-mcp
    port: 9090
    transport: http
    description: MCP adapter for APIMatic Platform API — Validation. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: validate-api-definition
      description: Validate API Definition
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: platform-validation.validateapidefinition
      with:
        apiEntityId: tools.apiEntityId
      outputParameters:
      - type: object
        mapping: $.
