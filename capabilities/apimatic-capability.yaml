naftiko: 1.0.0-alpha2
info:
  label: APIMatic Platform API
  description: The APIMatic Platform API provides programmatic access to APIMatic's capabilities including SDK generation,
    API documentation portal generation, API specification validation and linting, and API specification transformation. Integrate
    APIMatic into your CI/CD workflows to automate your developer experience suite.
  tags:
  - Apimatic
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: apimatic
    baseUri: https://api.apimatic.io
    description: APIMatic Platform API HTTP API.
    authentication:
      type: apikey
      in: header
      name: Authorization
      value: '{{APIMATIC_TOKEN}}'
    resources:
    - name: api-entities
      path: /api-entities
      operations:
      - name: listapientities
        method: GET
        description: List API Entities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: importapidefinition
        method: POST
        description: Import API Definition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-entities-apientityid-generate-sdk
      path: /api-entities/{apiEntityId}/generate-sdk
      operations:
      - name: generatesdk
        method: POST
        description: Generate SDK
        inputParameters:
        - name: apiEntityId
          in: path
          type: string
          required: true
          description: Unique identifier of the API entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-entities-apientityid-validate
      path: /api-entities/{apiEntityId}/validate
      operations:
      - name: validateapidefinition
        method: POST
        description: Validate API Definition
        inputParameters:
        - name: apiEntityId
          in: path
          type: string
          required: true
          description: Unique identifier of the API entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-entities-apientityid-transform
      path: /api-entities/{apiEntityId}/transform
      operations:
      - name: transformapidefinition
        method: POST
        description: Transform API Definition
        inputParameters:
        - name: apiEntityId
          in: path
          type: string
          required: true
          description: Unique identifier of the API entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-entities-apientityid-portal
      path: /api-entities/{apiEntityId}/portal
      operations:
      - name: generateportal
        method: POST
        description: Generate API Portal
        inputParameters:
        - name: apiEntityId
          in: path
          type: string
          required: true
          description: Unique identifier of the API entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: apimatic-rest
    description: REST adapter for APIMatic Platform API.
    resources:
    - path: /api-entities
      name: listapientities
      operations:
      - method: GET
        name: listapientities
        description: List API Entities
        call: apimatic.listapientities
        outputParameters:
        - type: object
          mapping: $.
    - path: /api-entities
      name: importapidefinition
      operations:
      - method: POST
        name: importapidefinition
        description: Import API Definition
        call: apimatic.importapidefinition
        outputParameters:
        - type: object
          mapping: $.
    - path: /api-entities/{apiEntityId}/generate-sdk
      name: generatesdk
      operations:
      - method: POST
        name: generatesdk
        description: Generate SDK
        call: apimatic.generatesdk
        with:
          apiEntityId: rest.apiEntityId
        outputParameters:
        - type: object
          mapping: $.
    - path: /api-entities/{apiEntityId}/validate
      name: validateapidefinition
      operations:
      - method: POST
        name: validateapidefinition
        description: Validate API Definition
        call: apimatic.validateapidefinition
        with:
          apiEntityId: rest.apiEntityId
        outputParameters:
        - type: object
          mapping: $.
    - path: /api-entities/{apiEntityId}/transform
      name: transformapidefinition
      operations:
      - method: POST
        name: transformapidefinition
        description: Transform API Definition
        call: apimatic.transformapidefinition
        with:
          apiEntityId: rest.apiEntityId
        outputParameters:
        - type: object
          mapping: $.
    - path: /api-entities/{apiEntityId}/portal
      name: generateportal
      operations:
      - method: POST
        name: generateportal
        description: Generate API Portal
        call: apimatic.generateportal
        with:
          apiEntityId: rest.apiEntityId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: apimatic-mcp
    transport: http
    description: MCP adapter for APIMatic Platform API for AI agent use.
    tools:
    - name: listapientities
      description: List API Entities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apimatic.listapientities
      outputParameters:
      - type: object
        mapping: $.
    - name: importapidefinition
      description: Import API Definition
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: apimatic.importapidefinition
      outputParameters:
      - type: object
        mapping: $.
    - name: generatesdk
      description: Generate SDK
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: apimatic.generatesdk
      with:
        apiEntityId: tools.apiEntityId
      inputParameters:
      - name: apiEntityId
        type: string
        description: Unique identifier of the API entity
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: validateapidefinition
      description: Validate API Definition
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: apimatic.validateapidefinition
      with:
        apiEntityId: tools.apiEntityId
      inputParameters:
      - name: apiEntityId
        type: string
        description: Unique identifier of the API entity
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: transformapidefinition
      description: Transform API Definition
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: apimatic.transformapidefinition
      with:
        apiEntityId: tools.apiEntityId
      inputParameters:
      - name: apiEntityId
        type: string
        description: Unique identifier of the API entity
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: generateportal
      description: Generate API Portal
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: apimatic.generateportal
      with:
        apiEntityId: tools.apiEntityId
      inputParameters:
      - name: apiEntityId
        type: string
        description: Unique identifier of the API entity
        required: true
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    APIMATIC_TOKEN: APIMATIC_TOKEN
